---
data_dir: ${DATA_DIR}

log_schema:
  host_key: pod

sources:
  # Reads the internal Vector logs
  vector:
    type: internal_logs

  # Captured stdout/stderr of the prepare container
  files_stdout:
    type: file
    include:
      - ${LOG_DIR}/*/*.stdout.log

  files_stderr:
    type: file
    include:
      - ${LOG_DIR}/*/*.stderr.log

  # Logs of the Stackable Rust sidecars (bundle-builder, user-info-fetcher)
  files_tracing_rs:
    type: file
    include:
      - ${LOG_DIR}/*/*.tracing-rs.json

  # OPA's own JSON logs (server and decision logs), rotated by multilog into `current`
  files_opa_json:
    type: file
    include:
      - ${LOG_DIR}/opa/current
      - ${LOG_DIR}/opa/test

transforms:
  processed_files_stdout:
    inputs:
      - files_stdout
    type: remap
    source: |
      .logger = "ROOT"
      .level = "INFO"

  processed_files_stderr:
    inputs:
      - files_stderr
    type: remap
    source: |
      .logger = "ROOT"
      .level = "ERROR"

  # Transforms the JSON logs of the Stackable Rust sidecars (tracing-rs format)
  processed_files_tracing_rs:
    inputs:
      - files_tracing_rs
    type: remap
    source: |
      raw_message = string!(.message)

      .timestamp = now()
      .logger = ""
      .level = "INFO"
      .message = ""
      .errors = []

      parsed_event, err = parse_json(raw_message)
      if err != null {
        error = "JSON not parsable: " + err
        .errors = push(.errors, error)
        log(error, level: "warn")
        .message = raw_message
      } else if !is_object(parsed_event) {
        error = "Parsed event is not a JSON object."
        .errors = push(.errors, error)
        log(error, level: "warn")
        .message = raw_message
      } else {
        event = object!(parsed_event)

        timestamp_string, err = string(event.timestamp)
        if err == null {
          parsed_timestamp, err = parse_timestamp(timestamp_string, "%+")
          if err == null {
            .timestamp = parsed_timestamp
          } else {
            .errors = push(.errors, "Timestamp not parsable, trying current time instead: " + err)
          }
        }

        .logger, err = string(event.target)
        if err != null || is_empty(.logger) {
          .errors = push(.errors, "Logger/target not found.")
        }

        level, err = string(event.level)
        if err != null {
          .errors = push(.errors, "Level not found, using \"" + .level + "\" instead.")
        } else if !includes(["TRACE", "DEBUG", "INFO", "WARN", "ERROR", "FATAL"], upcase(level)) {
          .errors = push(.errors, "Level \"" + level + "\" unknown, using \"" + .level + "\" instead.")
        } else {
          .level = upcase(level)
        }

        fields, err = object(event.fields)
        if err != null {
          .errors = push(.errors, "Fields are not an object.")
        }

        .message, err = string(fields.message)
        if err != null || is_empty(.message) {
          .errors = push(.errors, "Message not found.")
        }

        del(fields.message)

        other_fields = encode_key_value(fields, field_delimiter: "\n")
        .message = join!(compact([.message, other_fields]), "\n\n")
      }

  # Transforms OPA's own JSON logs
  processed_files_opa_json:
    inputs:
      - files_opa_json
    type: remap
    source: |
      raw_message = string!(.message)

      .timestamp = now()
      .logger = ""
      .level = "INFO"
      .message = ""
      .errors = []

      parsed_event, err = parse_json(raw_message)
      if err != null {
        error = "JSON not parsable: " + err
        .errors = push(.errors, error)
        log(error, level: "warn")
        .message = raw_message
      } else if !is_object(parsed_event) {
        error = "Parsed event is not a JSON object."
        .errors = push(.errors, error)
        log(error, level: "warn")
        .message = raw_message
      } else {
        event = object!(parsed_event)

        property_timestamp_valid = false
        timestamp_string, err = string(event.timestamp)
        if err == null {
          parsed_timestamp, err = parse_timestamp(timestamp_string, "%Y-%m-%dT%H:%M:%S.%fZ")
          if err == null {
            .timestamp = parsed_timestamp
            property_timestamp_valid = true
          } else {
            .errors = push(.errors, "Timestamp not parsable, trying property time instead: " + err)
          }
        }
        if !property_timestamp_valid {
          time_string, err = string(event.time)
          if err == null {
            parsed_timestamp, err = parse_timestamp(time_string, "%Y-%m-%dT%H:%M:%SZ")
            if err == null {
              .timestamp = parsed_timestamp
            } else {
              .errors = push(.errors, "Time not parsable, using current time instead: " + err)
            }
          } else {
            .errors = push(.errors, "Time not found, using current time instead.")
          }
        }

        .logger, err = string(event.logger)
        if err != null || is_empty(.logger) {
          .errors = push(.errors, "Logger not found.")
        }

        level, err = string(event.level)
        if err != null {
          .errors = push(.errors, "Level not found, using \"" + .level + "\" instead.")
        } else if !includes(["TRACE", "DEBUG", "INFO", "WARN", "ERROR", "FATAL"], upcase(level)) {
          .errors = push(.errors, "Level \"" + level + "\" unknown, using \"" + .level + "\" instead.")
        } else {
          .level = upcase(level)
        }

        .message, err = string(event.msg)
        if err != null || is_empty(.message) {
          .errors = push(.errors, "Message not found.")
        }

        del(event.time)
        del(event.timestamp)
        del(event.level)
        del(event.msg)

        other_fields = encode_key_value(event, field_delimiter: "\n")
        .message = join!(compact([.message, other_fields]), "\n\n")
      }

  # Extends the processed files with the fields "container" and "file"
  extended_logs_files:
    inputs:
      - processed_files_*
    type: remap
    source: |
      del(.source_type)
      if .errors == [] {
        del(.errors)
      }
      . |= parse_regex!(.file, r'^${LOG_DIR}/(?P<container>.*?)/(?P<file>.*?)$')

  # Filters the logs of the Vector agent according to the defined log level
  filtered_logs_vector:
    inputs:
      - vector
    type: filter
    condition: >
      (.metadata.level == "TRACE" && "${VECTOR_FILE_LOG_LEVEL}" == "trace") ||
      (.metadata.level == "DEBUG" && includes(["trace", "debug"], "${VECTOR_FILE_LOG_LEVEL}")) ||
      (.metadata.level == "INFO" && includes(["trace", "debug", "info"], "${VECTOR_FILE_LOG_LEVEL}")) ||
      (.metadata.level == "WARN" && includes(["trace", "debug", "info", "warn"], "${VECTOR_FILE_LOG_LEVEL}")) ||
      (.metadata.level == "ERROR" && includes(["trace", "debug", "info", "warn", "error"], "${VECTOR_FILE_LOG_LEVEL}"))

  # Aligns the logs of the Vector agent with the common format
  extended_logs_vector:
    inputs:
      - filtered_logs_vector
    type: remap
    source: |
      .container = "vector"
      .level = .metadata.level
      .logger = .metadata.module_path
      if exists(.file) {
        .processed_file = del(.file)
      }
      del(.metadata)
      del(.pid)
      del(.source_type)

  # Add the fields "namespace", "cluster", "role" and "roleGroup" to all logs
  extended_logs:
    inputs:
      - extended_logs_*
    type: remap
    source: |
      .namespace = "${NAMESPACE}"
      .cluster = "${CLUSTER_NAME}"
      .role = "${ROLE_NAME}"
      .roleGroup = "${ROLE_GROUP_NAME}"

sinks:
  # Forward the logs to the Vector aggregator
  aggregator:
    inputs:
      - extended_logs
    type: vector
    address: ${VECTOR_AGGREGATOR_ADDRESS}
